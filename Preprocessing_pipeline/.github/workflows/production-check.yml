name: production-check

on:
  push:
  pull_request:

jobs:
  runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-runtime.txt

      - name: Install runtime dependencies
        run: python -m pip install -r requirements-runtime.txt

      - name: Verify production manifest and smoke cases
        run: python verify_production_runtime.py

      - name: Run runtime unit tests
        run: >-
          python -m unittest -v
          test_unified_query_annotator
          text_preprocessing.test_preprocess_queries
          search_dictionaries.test_measurement_parser
          search_dictionaries.test_color_normalizer
